dataset:
  base_dir: "data/"            
  train_dir: "data/train/"
  val_dir: "data/val/"

model:
  name: "EfficientNetB0"
  pretrained: true
  custom_head:
    global_pooling: "avg"
    dense_units: 512
    dropout_rate: 0.5
    output_units: 1
    output_activation: "sigmoid"

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0005
  weight_decay: 0.0001
  optimizer: "adam"
  loss: "binary_crossentropy"
  metrics:
    - "accuracy"
    - "AUC"
  callbacks:
    early_stopping:
      patience: 7
    reduce_lr_on_plateau:
      factor: 0.5
      patience: 3
      min_lr: 1e-7

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation_range: 20
  zoom_range: 0.15
  brightness_range: [0.8, 1.2]

checkpoint:
  save_dir: "models/"
  save_name: "efficientnetb0_melanoma.pth"

inference:
  threshold: 0.5
